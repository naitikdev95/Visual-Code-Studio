kind = "web"
previewPath = "/"
title = "Python IDE"
version = "1.0.0"
id = "artifacts/python-ide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18692

[services.development]
run = "pnpm --filter @workspace/python-ide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/python-ide", "run", "build" ]
publicDir = "artifacts/python-ide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18692"
BASE_PATH = "/"
